# Rate limiting zones (berbasis IP address)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;

upstream auth_service {
    server auth-service:8001;
}

upstream ai_service {
    server ai-service:8002;
}

server {
    listen 80;
    server_name localhost;
    client_max_body_size 10M;

    # Auth Service routes - dengan rate limiting ketat (5 req/s)
    location /auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://auth_service/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Correlation-ID $http_x_correlation_id;
    }

    # Auth Service metrics
    location /auth/metrics {
        proxy_pass http://auth_service/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Correlation-ID $http_x_correlation_id;
    }

    # AI Service routes - dengan rate limiting sedang (20 req/s)
    location /chat/ {
        limit_req zone=api_limit burst=30 nodelay;
        limit_req_status 429;
        proxy_pass http://ai_service/chat/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Correlation-ID $http_x_correlation_id;
    }

    # AI Service metrics
    location /chat/metrics {
        proxy_pass http://ai_service/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Correlation-ID $http_x_correlation_id;
    }

    # AI Service health
    location /chat/health {
        proxy_pass http://ai_service/health;
        proxy_set_header Host $host;
        proxy_set_header X-Correlation-ID $http_x_correlation_id;
    }

    # Alias for frontend monitoring compatibility (mapping Items status to AI service)
    location /items/metrics {
        proxy_pass http://ai_service/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Correlation-ID $http_x_correlation_id;
    }

    location /items/health {
        proxy_pass http://ai_service/health;
        proxy_set_header Host $host;
        proxy_set_header X-Correlation-ID $http_x_correlation_id;
    }


    location /stats {
        proxy_pass http://ai_service/stats;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Correlation-ID $http_x_correlation_id;
    }

    # Health check aggregator
    location /health {
        default_type application/json;
        return 200 '{"status": "healthy", "service": "gateway"}';
    }


    # Frontend (static files) - dengan rate limiting umum
    location / {
        limit_req zone=general_limit burst=50 nodelay;
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Custom error page untuk rate limit
    error_page 429 = @rate_limited;
    location @rate_limited {
        default_type application/json;
        return 429 '{"error": "Too many requests. Please try again later.", "retry_after": 60}';
    }
}
