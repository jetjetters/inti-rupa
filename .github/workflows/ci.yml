# ==============================================
# CI Pipeline — Cloud App STEAM
# ==============================================
# Pipeline ini berjalan otomatis saat:
# - Push ke branch main
# - Pull Request ke branch main
# 
# Jobs:
# 1. test-backend: Install deps + run pytest
# 2. test-frontend: Install deps + run vitest
# 3. build-docker: Build Docker images

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ================================
  # JOB 1: Test Backend (Python/FastAPI) — Monolith legacy
  # ================================
  test-backend:
    name: 🐍 Test Backend (Legacy)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 📥 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧪 Run tests
        env:
          DATABASE_URL: "sqlite:///./test.db"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
        run: |
          pytest

  # ================================
  # JOB 1b: Test AI Service (Microservice)
  # ================================
  test-ai-service:
    name: 🤖 Test AI Service
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./services/ai-service

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ai-${{ hashFiles('services/ai-service/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-ai-

      - name: 📥 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧪 Run AI Service tests
        env:
          # SQLite in-memory — tidak perlu PostgreSQL atau service eksternal
          DATABASE_URL: "sqlite:///./test_ai.db"
          TESTING: "true"
          AUTH_SERVICE_URL: "http://fake-auth:8001"
          # API keys tidak diperlukan (AI calls di-mock)
          GEMINI_API_KEY: "fake-key-for-ci"
          HUGGINGFACE_API_KEY: "fake-key-for-ci"
        run: |
          pytest tests/ -v --tb=short

  # ================================
  # JOB 2: Test Frontend (React/Vitest)
  # ================================
  test-frontend:
    name: ⚛️ Test Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🧪 Run tests
        run: npm test

      - name: 🏗️ Build frontend
        run: npm run build

  # ================================
  # JOB 3: Build Docker Images
  # ================================
  build-docker:
    name: 🐳 Build Docker
    runs-on: ubuntu-latest
    needs: [test-backend, test-ai-service, test-frontend]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Build backend image
        run: docker build -t intirupa-backend:ci ./backend

      - name: 🐳 Build frontend image
        run: docker build --build-arg VITE_API_URL=http://localhost:8000 -t intirupa-frontend:ci ./frontend

      - name: ✅ Build success
        run: |
          echo "✅ All Docker images built successfully!"
          docker images | grep intirupa

  # ================================
  # JOB 3b: Integration Tests
  # ================================
  integration-test:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: [test-backend, test-ai-service, test-frontend]
    # Hanya jalankan integration test saat push/PR ke main
    # (membutuhkan secrets agar services bisa start)
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Start all services
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
          SECRET_KEY: ci-test-secret-key
        run: |
          # Buat .env sementara agar docker compose bisa start
          echo "GEMINI_API_KEY=${GEMINI_API_KEY}" > .env
          echo "HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY}" >> .env
          echo "SECRET_KEY=${SECRET_KEY}" >> .env
          docker compose up -d --build

      - name: ⏳ Tunggu semua services siap
        run: |
          echo "Menunggu services ready..."
          sleep 20
          # Retry health check gateway sampai berhasil
          for i in $(seq 1 10); do
            if curl --silent --fail http://localhost/health; then
              echo "✅ Gateway siap!"
              break
            fi
            echo "Attempt $i: Gateway belum siap, tunggu 5 detik..."
            sleep 5
          done

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📥 Install test dependencies
        run: pip install httpx pytest

      - name: 🧪 Jalankan Integration Tests
        env:
          GATEWAY_URL: "http://localhost"
        run: |
          pytest tests/integration/ -v --tb=short

      - name: 🛑 Stop all services
        if: always()
        run: docker compose down -v

  # ================================
  # JOB 4: Deploy ke Railway
  # ================================
  deploy:
    name: 🚀 Deploy to Railway
    runs-on: ubuntu-latest
    needs: [test-backend, test-ai-service, test-frontend, build-docker, integration-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # ↑ HANYA deploy saat push ke main (bukan saat PR)

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 🚂 Install Railway CLI
        run: npm install -g @railway/cli

      - name: 🚀 Deploy Backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ vars.RAILWAY_ENVIRONMENT_ID }}
        run: |
          cd backend
          # Railway CLI v4 reads RAILWAY_TOKEN, RAILWAY_PROJECT_ID, RAILWAY_ENVIRONMENT_ID
          # automatically from env vars — no `railway link` needed
          railway up --service backend --detach

      - name: 🚀 Deploy Frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ vars.RAILWAY_ENVIRONMENT_ID }}
        run: |
          cd frontend
          # Railway CLI v4 reads RAILWAY_TOKEN, RAILWAY_PROJECT_ID, RAILWAY_ENVIRONMENT_ID
          # automatically from env vars — no `railway link` needed
          railway up --service frontend --detach

      - name: 🩺 Automated Health Check
        run: |
          BACKEND_URL="https://cc-kelompok-a-steam-production.up.railway.app/health"
          FRONTEND_URL="https://cc-kelompok-a-steam-production-51bf.up.railway.app"
          MAX_ATTEMPTS=6
          SLEEP_BETWEEN_ATTEMPTS=10

          echo "Checking Backend Health..."
          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            echo "Backend health check attempt $attempt/$MAX_ATTEMPTS: $BACKEND_URL"
            if BACKEND_RESPONSE=$(curl --fail --show-error --silent --location --max-time 10 "$BACKEND_URL"); then
              echo "Response: $BACKEND_RESPONSE"
              if python3 -c 'import json, sys; sys.exit(0 if json.loads(sys.argv[1]).get("status") == "healthy" else 1)' "$BACKEND_RESPONSE"; then
                echo "✅ Backend is HEALTHY!"
                BACKEND_OK=1
                break
              fi
              echo "Backend response did not report status=healthy."
            else
              echo "Backend request failed."
            fi

            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo "Waiting $SLEEP_BETWEEN_ATTEMPTS seconds before retrying backend..."
              sleep "$SLEEP_BETWEEN_ATTEMPTS"
            fi
          done

          if [ "${BACKEND_OK:-0}" -ne 1 ]; then
            echo "❌ Backend Health Check FAILED!"
            exit 1
          fi

          echo "Checking Frontend Health..."
          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            echo "Frontend health check attempt $attempt/$MAX_ATTEMPTS: $FRONTEND_URL"
            if FRONTEND_STATUS=$(curl --fail --show-error --silent --location --output /dev/null --write-out "%{http_code}" --max-time 10 "$FRONTEND_URL"); then
              echo "HTTP Status Code: $FRONTEND_STATUS"
              if [ "$FRONTEND_STATUS" -eq 200 ]; then
                echo "✅ Frontend is HEALTHY!"
                FRONTEND_OK=1
                break
              fi
            else
              echo "Frontend request failed."
            fi

            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo "Waiting $SLEEP_BETWEEN_ATTEMPTS seconds before retrying frontend..."
              sleep "$SLEEP_BETWEEN_ATTEMPTS"
            fi
          done

          if [ "${FRONTEND_OK:-0}" -ne 1 ]; then
            echo "❌ Frontend Health Check FAILED!"
            exit 1
          fi

      - name: ✅ Deploy complete
        run: |
          echo "✅ Deployment and health checks completed successfully!"
          echo "Backend: https://cc-kelompok-a-steam-production.up.railway.app"
          echo "Frontend: https://cc-kelompok-a-steam-production-51bf.up.railway.app"
