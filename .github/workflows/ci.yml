# ==============================================
# CI Pipeline — Cloud App STEAM
# ==============================================
# Pipeline ini berjalan otomatis saat:
# - Push ke branch main
# - Pull Request ke branch main
# 
# Jobs:
# 1. test-backend: Install deps + run pytest
# 2. test-frontend: Install deps + run vitest
# 3. build-docker: Build Docker images

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ================================
  # JOB 1: Test Backend (Python/FastAPI)
  # ================================
  test-backend:
    name: 🐍 Test Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 📥 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧪 Run tests
        env:
          DATABASE_URL: "sqlite:///./test.db"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
        run: |
          pytest

  # ================================
  # JOB 2: Test Frontend (React/Vitest)
  # ================================
  test-frontend:
    name: ⚛️ Test Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🧪 Run tests
        run: npm test

      - name: 🏗️ Build frontend
        run: npm run build

  # ================================
  # JOB 3: Build Docker Images
  # ================================
  build-docker:
    name: 🐳 Build Docker
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Build backend image
        run: docker build -t intirupa-backend:ci ./backend

      - name: 🐳 Build frontend image
        run: docker build --build-arg VITE_API_URL=http://localhost:8000 -t intirupa-frontend:ci ./frontend

      - name: ✅ Build success
        run: |
          echo "✅ All Docker images built successfully!"
          docker images | grep intirupa

  # ================================
  # JOB 4: Deploy ke Railway
  # ================================
  deploy:
    name: 🚀 Deploy to Railway
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, build-docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # ↑ HANYA deploy saat push ke main (bukan saat PR)

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 🚂 Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: 🚀 Deploy Backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ vars.RAILWAY_ENVIRONMENT_ID }}
        run: |
          cd backend
          railway up --project "$RAILWAY_PROJECT_ID" --environment "$RAILWAY_ENVIRONMENT_ID" --service backend --detach

      - name: 🚀 Deploy Frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ vars.RAILWAY_ENVIRONMENT_ID }}
        run: |
          cd frontend
          railway up --project "$RAILWAY_PROJECT_ID" --environment "$RAILWAY_ENVIRONMENT_ID" --service cc-kelompok-a-steam --detach

      - name: 🩺 Automated Health Check
        run: |
          BACKEND_URL="https://cc-kelompok-a-steam-production.up.railway.app/health"
          FRONTEND_URL="https://cc-kelompok-a-steam-production-51bf.up.railway.app"
          MAX_ATTEMPTS=6
          SLEEP_BETWEEN_ATTEMPTS=10

          echo "Checking Backend Health..."
          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            echo "Backend health check attempt $attempt/$MAX_ATTEMPTS: $BACKEND_URL"
            if BACKEND_RESPONSE=$(curl --fail --show-error --silent --location --max-time 10 "$BACKEND_URL"); then
              echo "Response: $BACKEND_RESPONSE"
              if python3 -c 'import json, sys; sys.exit(0 if json.loads(sys.argv[1]).get("status") == "healthy" else 1)' "$BACKEND_RESPONSE"; then
                echo "✅ Backend is HEALTHY!"
                BACKEND_OK=1
                break
              fi
              echo "Backend response did not report status=healthy."
            else
              echo "Backend request failed."
            fi

            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo "Waiting $SLEEP_BETWEEN_ATTEMPTS seconds before retrying backend..."
              sleep "$SLEEP_BETWEEN_ATTEMPTS"
            fi
          done

          if [ "${BACKEND_OK:-0}" -ne 1 ]; then
            echo "❌ Backend Health Check FAILED!"
            exit 1
          fi

          echo "Checking Frontend Health..."
          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            echo "Frontend health check attempt $attempt/$MAX_ATTEMPTS: $FRONTEND_URL"
            if FRONTEND_STATUS=$(curl --fail --show-error --silent --location --output /dev/null --write-out "%{http_code}" --max-time 10 "$FRONTEND_URL"); then
              echo "HTTP Status Code: $FRONTEND_STATUS"
              if [ "$FRONTEND_STATUS" -eq 200 ]; then
                echo "✅ Frontend is HEALTHY!"
                FRONTEND_OK=1
                break
              fi
            else
              echo "Frontend request failed."
            fi

            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo "Waiting $SLEEP_BETWEEN_ATTEMPTS seconds before retrying frontend..."
              sleep "$SLEEP_BETWEEN_ATTEMPTS"
            fi
          done

          if [ "${FRONTEND_OK:-0}" -ne 1 ]; then
            echo "❌ Frontend Health Check FAILED!"
            exit 1
          fi

      - name: ✅ Deploy complete
        run: |
          echo "✅ Deployment and health checks completed successfully!"
          echo "Backend: https://cc-kelompok-a-steam-production.up.railway.app"
          echo "Frontend: https://cc-kelompok-a-steam-production-51bf.up.railway.app"
